services:
  - type: web
    name: invoicing-backend
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 5000
